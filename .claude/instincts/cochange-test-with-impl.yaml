# Always Update Tests When Changing Implementation

## Action
Never commit an implementation change without updating the corresponding test file in the same commit. Key pairs:
- `bot/callback.go` -> `bot/callback_test.go` + `bot/handler_test.go`
- `bot/handler.go` -> `bot/handler_test.go`
- `formatter/format.go` -> `formatter/format_test.go`
- `qbt/http.go` -> `qbt/http_test.go`

## Why
100% of feature commits in this repo include co-changed test files. The project enforces 80%+ coverage and mandatory integration tests.
