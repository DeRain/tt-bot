# Extend Interfaces Before Implementation

## Action
When adding a new feature that requires qBittorrent API calls or Telegram interactions:
1. Add method to `qbt.Client` interface in `internal/qbt/client.go`
2. Implement in `internal/qbt/http.go`
3. Wire into bot handler via `internal/bot/callback.go` or `internal/bot/handler.go`

## Pattern
`qbt/client.go` and `qbt/http.go` always change together (4 co-occurrences). The interface is the contract; mock it for unit tests, test against real service for integration.

## Why
Interface-driven design enables unit testing with mocks while keeping integration tests against real qBittorrent for API contract verification.
