# Run Integration Tests Before Every Commit

## Action
Always run `make test-integration` before committing. Never mark an acceptance criterion as PASS based on unit tests alone.

## Why
qBittorrent v5 renamed `/pause` -> `/stop` and `/resume` -> `/start`. Unit tests with httptest mocks passed perfectly. Only Docker-based integration tests against a real qBittorrent instance caught the 404 errors. This is a learned incident, not a theoretical concern.
