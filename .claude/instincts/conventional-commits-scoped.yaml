# Use Conventional Commits with Feature Scope

## Action
Format: `<type>(<scope>): <description>`

Types: feat, fix, chore, docs, test, refactor, perf
Scope: feature-id from docs/features/ (e.g., torrent-files, uploading-list)

Examples:
- `feat(torrent-files): view and manage torrent file download priorities`
- `fix: exclude paused/stopped uploads from /uploading list`
- `test(status-emojis): add E2E integration tests`

## Why
88% of existing commits follow this convention. Scoped feature IDs enable traceability back to docs/features/<id>/.
