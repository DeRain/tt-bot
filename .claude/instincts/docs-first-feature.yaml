# Always Create Feature Docs Before Implementation

## Action
Create `docs/features/<feature-id>/` with spec.md, design.md, plan.md, traceability.md, and verification.md BEFORE writing any code. Use templates from `docs/features/_templates/`.

## Pattern
Every feature in this repo (auth, add-torrent, list-torrents, completion-notifications, config, set-commands, downloading-list, uploading-list, status-emojis, torrent-control, torrent-detail-extra, torrent-files, torrent-remove) follows this pattern with zero exceptions.

## Why
Requirements traceability ensures every code change maps to a REQ-* and TASK-*. Prevents scope creep and enables verification against acceptance criteria.
