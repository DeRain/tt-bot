services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - WEBUI_PORT=8080
    volumes:
      - ./testdata/qbt-config:/config/qBittorrent/
    ports:
      - "18080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/api/v2/app/version | grep -qE '200|401|403'"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s

  integration-tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      qbittorrent:
        condition: service_healthy
    environment:
      - QBITTORRENT_URL=http://qbittorrent:8080
      - QBITTORRENT_USERNAME=admin
      - QBITTORRENT_PASSWORD=
